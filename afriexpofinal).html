// ─── Firebase helpers ─────────────────────────────────────────
const db = () => window._db
const auth = () => window._auth
const ts = () => window._ts ? window._ts() : new Date().toISOString()

const col = (name) => db()?.collection(name)
const docRef = (col, id) => db()?.collection(col).doc(id)
const addDoc = async (colName, data) => db()?.collection(colName).add(data)
const setDoc = async (colName, id, data) => db()?.collection(colName).doc(id).set(data)
const getDoc = async (colName, id) => {
  const snap = await db()?.collection(colName).doc(id).get()
  return snap?.exists ? { id: snap.id, ...snap.data() } : null
}
const getDocs = async (colName, constraints = []) => {
  let ref = db()?.collection(colName)
  constraints.forEach(c => {
    if (c.type === 'where') ref = ref?.where(c.f, c.op, c.v)
    if (c.type === 'orderBy') ref = ref?.orderBy(c.f, c.dir || 'asc')
    if (c.type === 'limit') ref = ref?.limit(c.n)
  })
  const snap = await ref?.get()
  return snap?.docs.map(d => ({ id: d.id, ...d.data() })) || []
}
const updateDoc = async (colName, id, data) => db()?.collection(colName).doc(id).update(data)
const deleteDoc = async (colName, id) => db()?.collection(colName).doc(id).delete()
const onSnap = (colName, constraints, cb) => {
  let ref = db()?.collection(colName)
  constraints.forEach(c => {
    if (c.type === 'where') ref = ref?.where(c.f, c.op, c.v)
    if (c.type === 'orderBy') ref = ref?.orderBy(c.f, c.dir || 'asc')
    if (c.type === 'limit') ref = ref?.limit(c.n)
  })
  return ref?.onSnapshot(snap => cb(snap?.docs.map(d => ({ id: d.id, ...d.data() })) || []))
}

// Seed platform exhibitions if not present

  try {
    const existing = await getDocs('exhibitions', [{ type: 'limit', n: 1 }])
    if (existing.length > 0) return
    const expos = [
      { title:"EthioExport Summit 2025", subtitle:"Africa's Premier Trade Gateway", date:"March 15–18, 2025", location:"Virtual + Addis Ababa Hybrid", category:"Multi-Sector", status:"upcoming", exhibitors:320, visitors:8500, countries:42, sectors:["Agriculture","Textiles","Manufacturing","Tech"], description:"The flagship annual B2B exhibition connecting Ethiopian exporters with global buyers.", createdAt: ts() },

// ─── AUTH ─────────────────────────────────────────────────────
function AuthPage({ onAuth }) {
  const [mode, setMode] = useState("login")
  const [form, setForm] = useState({ email:"", password:"", name:"", company:"", role:"exhibitor" })
  const [err, setErr] = useState("")
  const [loading, setLoading] = useState(false)
  const set = (k,v) => setForm(f=>({...f,[k]:v}))

  const errMap = {
    "auth/email-already-in-use":"An account with this email already exists.",
    "auth/invalid-email":"Please enter a valid email address.",
    "auth/weak-password":"Password must be at least 6 characters.",
    "auth/user-not-found":"No account found with this email.",
    "auth/wrong-password":"Incorrect password.",
    "auth/invalid-credential":"Invalid email or password.",
    "auth/too-many-requests":"Too many attempts. Try again later.",
    "auth/network-request-failed":"Network error. Check your connection.",
  }

  const submit = async () => {
    setErr(""); setLoading(true)
    const a = auth(); const d = db()
    if (!a || !d) { setErr("Firebase not loaded. Please wait."); setLoading(false); return }
    try {
      if (mode === "login") {
        const cred = await a.signInWithEmailAndPassword(form.email, form.password)
        const snap = await d.collection("users").doc(cred.user.uid).get()
        const p = snap.exists ? snap.data() : {}
        onAuth({ id:cred.user.uid, name:p.name||cred.user.displayName||form.email.split("@")[0], email:cred.user.email, role:p.role||"visitor", company:p.company||"", avatar:p.avatar||(p.name||"U").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(), verified:p.verified||false, country:p.country||"", bio:p.bio||"", phone:p.phone||"", website:p.website||"", category:p.category||"", products:p.products||[], tags:p.tags||[], description:p.description||"", seeking:p.seeking||"" })
      } else {
        if (!form.name||!form.email||!form.password) { setErr("All fields are required"); setLoading(false); return }
        if (form.password.length<6) { setErr("Password must be at least 6 characters"); setLoading(false); return }
        const cred = await a.createUserWithEmailAndPassword(form.email, form.password)
        await cred.user.updateProfile({ displayName: form.name })
        const av = form.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()
        const prof = { id:cred.user.uid, name:form.name, email:form.email, role:form.role, company:form.company||"", avatar:av, verified:false, country:"", bio:"", phone:"", website:"", category:"", products:[], tags:[], description:"", seeking:"", createdAt:ts() }
        await d.collection("users").doc(cred.user.uid).set(prof)
        onAuth({ ...prof })
      }
    } catch(e) { setErr(errMap[e.code]||e.message||"Something went wrong.") }
    setLoading(false)
  }

  const googleSign = async () => {
    setErr(""); setLoading(true)
    const a = auth(); const d = db()
    if (!a||!d) { setErr("Firebase not ready"); setLoading(false); return }
    try {
      const r = await a.signInWithPopup(window._googleProvider)
      const snap = await d.collection("users").doc(r.user.uid).get()
      let p = snap.exists ? snap.data() : null
      if (!p) {
        const av = (r.user.displayName||"U").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()
        p = { id:r.user.uid, name:r.user.displayName||r.user.email.split("@")[0], email:r.user.email, role:"visitor", company:"", avatar:av, verified:false, country:"", bio:"", phone:"", website:"", category:"", products:[], tags:[], description:"", seeking:"", createdAt:ts() }
        await d.collection("users").doc(r.user.uid).set(p)
      }
      onAuth({ ...p, id:r.user.uid })
    } catch(e) { if(e.code!=="auth/popup-closed-by-user") setErr(e.message) }
    setLoading(false)
  }

  return (
    <div className="hbg" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <style>{S}</style>
      <div style={{width:"100%",maxWidth:440}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#FF9A1A,#E67E00)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}>
            <span style={{color:"#0a0806",fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:22}}>A</span>
          </div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:800,color:"#FFD59A"}}>AfriExpo</h1>
          <p style={{color:"#9A7540",fontSize:13,marginTop:4}}>Africa's Digital Trade Platform</p>
        </div>
        <div className="card fu" style={{padding:32}}>
          <div style={{display:"flex",background:"rgba(10,8,6,.5)",borderRadius:10,padding:3,marginBottom:24}}>
            {["login","register"].map(m=>(

// ─── NOTIFICATIONS ────────────────────────────────────────────
function NotifPanel({ user, onClose }) {
  const [notifs, setNotifs] = useState([])
  const imap = { match:"zap", message:"msg", meeting:"calendar", inquiry:"package", system:"check" }

  useEffect(() => {
    if (!user?.id || user.isGuest) return
    const unsub = onSnap("notifications",
      [{type:"where",f:"userId",op:"==",v:user.id},{type:"orderBy",f:"createdAt",dir:"desc"},{type:"limit",n:20}],
      docs => setNotifs(docs)
    )
    return () => unsub?.()
  }, [user?.id])

  const markRead = async (id) => {
    await updateDoc("notifications", id, { read: true }).catch(()=>{})
    setNotifs(n=>n.map(x=>x.id===id?{...x,read:true}:x))
  }
  const markAll = async () => {
    for (const n of notifs.filter(x=>!x.read)) await updateDoc("notifications", n.id, {read:true}).catch(()=>{})
    setNotifs(n=>n.map(x=>({...x,read:true})))
  }
  const unread = notifs.filter(n=>!n.read).length

  return (
    <div style={{position:"fixed",top:64,right:16,width:340,zIndex:60,animation:"fup .2s ease both"}}>
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",borderBottom:"1px solid rgba(69,48,13,.35)"}}>
          <span style={{fontWeight:600,color:"#E8DCC8",fontSize:14}}>Notifications {unread>0&&<span style={{color:"#FF9A1A",fontSize:12}}>({unread})</span>}</span>
          <div style={{display:"flex",gap:8}}>
            {unread>0&&<button onClick={markAll} style={{color:"#9A7540",fontSize:11,background:"none",border:"none",cursor:"pointer"}}>Mark all read</button>}
            <button onClick={onClose} style={{color:"#614518",background:"none",border:"none",cursor:"pointer"}}><Icon name="x" size={14}/></button>
          </div>
        </div>
        <div style={{maxHeight:360,overflowY:"auto"}}>
          {notifs.length===0&&<div style={{padding:24,textAlign:"center",color:"#7D5C28",fontSize:13}}>No notifications yet</div>}
          {notifs.map(n=>(
            <div key={n.id} onClick={()=>markRead(n.id)} style={{padding:"12px 16px",borderBottom:"1px solid rgba(42,28,6,.5)",display:"flex",gap:10,cursor:"pointer",background:n.read?"transparent":"rgba(255,154,26,.03)"}}>
              <div style={{width:32,height:32,borderRadius:8,background:"rgba(46,24,0,.6)",border:"1px solid rgba(138,73,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#FF9A1A"}}>
                <Icon name={imap[n.type]||"bell"} size={14}/>
              </div>
              <div style={{flex:1}}>
                <p style={{fontSize:12,color:n.read?"#9A7540":"#E8DCC8",lineHeight:1.4}}>{n.text}</p>
                <p style={{fontSize:10,color:"#614518",marginTop:3}}>{n.time||""}</p>
              </div>
              {!n.read&&<div style={{width:7,height:7,borderRadius:4,background:"#FF9A1A",flexShrink:0,marginTop:4}}/>}
            </div>
          ))}
        </div>
      </div>
    </div>
  )
}

      setShowAdd(false)
      setForm({ title:"",description:"",price:"",moq:"",category:"Agriculture & Food",origin:"",contact:"" })

              <input className="inp" value={form.moq} onChange={e=>setForm(f=>({...f,moq:e.target.value}))} placeholder="e.g. 5 MT"/>

      )}

// ─── MESSAGES ─────────────────────────────────────────────────
function MessagesPage({ user }) {
  const [conversations, setConversations] = useState([])
  const [activeId, setActiveId] = useState(null)
  const [messages, setMessages] = useState([])
  const [newMsg, setNewMsg] = useState("")
  const [sending, setSending] = useState(false)
  const [newConv, setNewConv] = useState(false)
  const [newConvWith, setNewConvWith] = useState("")
  const bottomRef = useRef(null)

  // Load conversations
  useEffect(()=>{
    if (!user?.id||user.isGuest) return
    const unsub = onSnap("conversations",[{type:"where",f:"participants",op:"array-contains",v:user.id},{type:"orderBy",f:"updatedAt",dir:"desc"}], docs=>setConversations(docs))
    return ()=>unsub?.()
  },[user?.id])

  // Load messages for active conv
  useEffect(()=>{
    if (!activeId) return
    const unsub = onSnap("messages",[{type:"where",f:"conversationId",op:"==",v:activeId},{type:"orderBy",f:"createdAt",dir:"asc"}], docs=>setMessages(docs))
    return ()=>unsub?.()
  },[activeId])

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}) },[messages])

  const active = conversations.find(c=>c.id===activeId)

  const send = async () => {
    if (!newMsg.trim()||!activeId) return
    setSending(true)
    const m = { conversationId:activeId, senderId:user.id, senderName:user.name, text:newMsg.trim(), createdAt:ts() }
    setNewMsg("")
    try {
      await addDoc("messages",m)
      await updateDoc("conversations",activeId,{lastMessage:m.text,updatedAt:ts()})
    } catch {}
    setSending(false)
  }

  const startConv = async () => {
    if (!newConvWith.trim()) return
    const c = { participants:[user.id], participantNames:[user.name], withName:newConvWith.trim(), lastMessage:"", createdAt:ts(), updatedAt:ts(), creatorId:user.id }
    try {
      const ref = await addDoc("conversations",c)
      setActiveId(ref.id)
    } catch {}
    setNewConv(false); setNewConvWith("")
  }

  if (user?.isGuest) return (
    <div style={{maxWidth:600,margin:"80px auto",padding:24,textAlign:"center"}}>
      <div className="card" style={{padding:48}}>
        <Icon name="msg" size={48} style={{color:"#614518",margin:"0 auto 16px",display:"block"}}/>
        <h2 style={{color:"#E8DCC8",marginBottom:8}}>Sign in to access messages</h2>
        <p style={{color:"#9A7540",fontSize:14}}>Create a free account to start B2B conversations with African businesses.</p>
      </div>
    </div>
  )

  return (
    <div style={{maxWidth:1200,margin:"0 auto",padding:"80px 24px 60px"}}>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,color:"#FFD59A",marginBottom:20}}>Messages</h1>
      <div style={{display:"grid",gridTemplateColumns:"300px 1fr",gap:16,height:"calc(100vh - 220px)"}}>
        {/* Sidebar */}
        <div className="card" style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{padding:12,borderBottom:"1px solid rgba(69,48,13,.3)"}}>
            <button className="btn btn-p" onClick={()=>setNewConv(!newConv)} style={{width:"100%",justifyContent:"center",fontSize:12}}>
              <Icon name="plus" size={14}/> New Conversation
            </button>
          </div>
          {newConv&&(
            <div style={{padding:12,borderBottom:"1px solid rgba(69,48,13,.3)",background:"rgba(42,28,6,.3)"}}>
              <input className="inp" value={newConvWith} onChange={e=>setNewConvWith(e.target.value)} placeholder="Company or person name..." style={{marginBottom:8,fontSize:12}}/>
              <div style={{display:"flex",gap:8}}>
                <button className="btn btn-p" onClick={startConv} style={{flex:1,justifyContent:"center",fontSize:12,padding:"7px"}}>Start</button>
                <button className="btn btn-g" onClick={()=>setNewConv(false)} style={{fontSize:12,padding:"7px 10px"}}>✕</button>
              </div>
            </div>
          )}
          <div style={{flex:1,overflowY:"auto"}}>
            {conversations.length===0&&<div style={{padding:20,textAlign:"center",color:"#7D5C28",fontSize:13}}>No conversations yet. Start one above!</div>}
            {conversations.map(c=>(
              <div key={c.id} onClick={()=>setActiveId(c.id)} style={{padding:"12px 14px",borderBottom:"1px solid rgba(42,28,6,.5)",cursor:"pointer",background:activeId===c.id?"rgba(138,73,0,.15)":"transparent",display:"flex",alignItems:"center",gap:10}}>
                <Av name={c.withName||"?"} color="#7c3d12" size={36}/>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontWeight:600,color:"#E8DCC8",fontSize:13}}>{c.withName}</p>
                  <p style={{color:"#7D5C28",fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.lastMessage||"Start a conversation"}</p>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Chat area */}
        {active?(
          <div className="card" style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"12px 18px",borderBottom:"1px solid rgba(69,48,13,.3)",display:"flex",alignItems:"center",gap:12}}>
              <Av name={active.withName||"?"} color="#7c3d12" size={36}/>
              <div style={{flex:1}}>
                <p style={{fontWeight:600,color:"#E8DCC8",fontSize:14}}>{active.withName}</p>
                <p style={{color:"#7D5C28",fontSize:11}}>B2B Conversation</p>
              </div>
              <button className="btn btn-g" style={{padding:"6px 12px",fontSize:12}}><Icon name="calendar" size={13}/> Schedule Meeting</button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:10}}>
              {messages.length===0&&<div style={{textAlign:"center",color:"#614518",fontSize:13,padding:20}}>Say hello to start the conversation!</div>}
              {messages.map(m=>(
                <div key={m.id} style={{display:"flex",justifyContent:m.senderId===user.id?"flex-end":"flex-start"}}>
                  <div className={m.senderId===user.id?"msgme":"msgthem"} style={{maxWidth:"70%",padding:"10px 14px",fontSize:13,color:"#E8DCC8",lineHeight:1.6}}>
                    {m.senderId!==user.id&&<p style={{fontSize:10,color:"#FF9A1A",marginBottom:4,fontWeight:600}}>{m.senderName}</p>}
                    <p>{m.text}</p>
                  </div>
                </div>
              ))}
              <div ref={bottomRef}/>
            </div>
            <div style={{padding:"12px 16px",borderTop:"1px solid rgba(69,48,13,.3)",display:"flex",gap:10}}>
              <input className="inp" value={newMsg} onChange={e=>setNewMsg(e.target.value)} placeholder="Type a message…" style={{flex:1}} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()}/>
              <button className="btn btn-p" onClick={send} disabled={sending||!newMsg.trim()} style={{flexShrink:0}}>
                {sending?<Spin size={14}/>:<Icon name="send" size={15}/>}
              </button>
            </div>
          </div>
        ):(
          <div className="card" style={{display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
            <Icon name="msg" size={40} style={{color:"#614518"}}/>
            <p style={{color:"#7D5C28",fontSize:14}}>Select a conversation or start a new one</p>
          </div>
        )}
      </div>
    </div>
  )
}

function DashboardPage({ user, setPage }) {
  const [tab, setTab] = useState("overview")
  const [meetings, setMeetings] = useState([])
  const [listings, setListings] = useState([])
  const [bookingForm, setBookingForm] = useState({with:"",date:"",time:"",topic:""})
  const [bookingMsg, setBookingMsg] = useState("")
  const [stats, setStats] = useState({views:0,inquiries:0,meetingsCount:0})

  useEffect(()=>{
    if (!user?.id||user.isGuest) return
    getDocs("meetings",[{type:"where",f:"userId",op:"==",v:user.id},{type:"orderBy",f:"createdAt",dir:"desc"}]).then(setMeetings).catch(()=>{})
    getDocs("marketplace",[{type:"where",f:"sellerId",op:"==",v:user.id}]).then(setListings).catch(()=>{})
  },[user?.id,tab])

  const bookMeeting = async () => {
    if (!bookingForm.with||!bookingForm.date) return
    const entry = {...bookingForm,userId:user.id,userName:user.name,status:"confirmed",createdAt:ts()}
    try {
      const ref = await addDoc("meetings",entry)
      setMeetings(m=>[{...entry,id:ref.id},...m])
      await addDoc("notifications",{userId:user.id,type:"meeting",text:`Meeting booked with ${bookingForm.with} on ${bookingForm.date}`,read:false,createdAt:ts()}).catch(()=>{})
    } catch { setMeetings(m=>[{...entry,id:`l_${Date.now()}`},...m]) }

            {[["building","My Role",user.role||"visitor","Get verified","#FF9A1A"],["package","My Listings",listings.length,"Marketplace items","#34d399"],["calendar","Meetings",meetings.length,"Scheduled","#FFB84D"],["map","Country",user.country||"—","Location","#9A7540"]].map(([ic,label,value,sub,c])=>(

      {tab==="my listings"&&(

            <button className="btn btn-p" onClick={()=>setPage("marketplace")} style={{fontSize:13}}><Icon name="plus" size={13}/> Add Listing</button>
          </div>
          {listings.length===0?<div style={{textAlign:"center",padding:60,color:"#614518"}}>
            <Icon name="package" size={40} style={{margin:"0 auto 12px",display:"block"}}/>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>

              <div key={l.id} className="card" style={{padding:20}}>

            ))}

        </div>
      )}

      {tab==="profile settings"&&<ProfileSettings user={user}/>}
    </div>
  )
}

// ─── PROFILE SETTINGS (inside dashboard) ─────────────────────
function ProfileSettings({ user }) {
  const [form, setForm] = useState({
    name:user.name||"", company:user.company||"", role:user.role||"visitor",
    country:user.country||"", bio:user.bio||"", phone:user.phone||"",
    website:user.website||"", category:user.category||"", description:user.description||"",
    seeking:user.seeking||"",
    products:(user.products||[]).join("\n"),
    tags:(user.tags||[]).join(", "),
  })
  const [saving, setSaving] = useState(false)
  const [success, setSuccess] = useState(false)
  const [err, setErr] = useState("")

  const save = async () => {
    setSaving(true); setErr(""); setSuccess(false)
    try {
      const productsArr = form.products.split("\n").map(s=>s.trim()).filter(Boolean)
      const tagsArr = form.tags.split(",").map(s=>s.trim()).filter(Boolean)
      const updates = { ...form, products:productsArr, tags:tagsArr, updatedAt:ts() }
      delete updates.products; delete updates.tags
      await updateDoc("users",user.id,{ ...form, products:productsArr, tags:tagsArr, updatedAt:ts() })
      if (auth()?.currentUser) await auth().currentUser.updateProfile({ displayName: form.name }).catch(()=>{})
      setSuccess(true); setTimeout(()=>setSuccess(false),3000)
    } catch(e) { setErr(e.message||"Failed to save.") }
    setSaving(false)
  }

  const ROLES = ["exhibitor","buyer","investor","logistics","visitor"]
  const COUNTRIES = ["Ethiopia","Kenya","Rwanda","Tanzania","Uganda","Ghana","Nigeria","South Africa","Egypt","Morocco","Senegal","Other"]
  const CATEGORIES = ["Agriculture & Food","Textiles & Apparel","Manufacturing","Technology & ICT","Logistics & Transport","Energy & Sustainability","Finance & Banking","Leather & Crafts","Healthcare","Other"]

  return (
    <div style={{maxWidth:640}}>
      {success&&<div style={{background:"rgba(6,78,59,.3)",border:"1px solid rgba(52,211,153,.2)",borderRadius:10,padding:"12px 16px",color:"#6ee7b7",fontSize:13,marginBottom:16,display:"flex",alignItems:"center",gap:8}}><Icon name="check" size={14}/> Profile saved successfully!</div>}
      {err&&<div style={{background:"rgba(127,29,29,.3)",border:"1px solid rgba(252,165,165,.2)",borderRadius:10,padding:"12px 16px",color:"#fca5a5",fontSize:13,marginBottom:16}}>{err}</div>}
      <div className="card" style={{padding:28,marginBottom:16}}>
        <h3 style={{fontWeight:600,color:"#E8DCC8",fontSize:16,marginBottom:20}}>Personal Info</h3>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:6}}>Full Name</label>
            <input className="inp" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
          <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:6}}>Company / Organisation</label>
            <input className="inp" value={form.company} onChange={e=>setForm(f=>({...f,company:e.target.value}))}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:6}}>Role</label>
              <select className="inp" value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}>
                {ROLES.map(r=><option key={r} value={r}>{r.charAt(0).toUpperCase()+r.slice(1)}</option>)}
              </select></div>
            <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:6}}>Country</label>
              <select className="inp" value={form.country} onChange={e=>setForm(f=>({...f,country:e.target.value}))}>
                <option value="">Select country…</option>
                {COUNTRIES.map(c=><option key={c}>{c}</option>)}
              </select></div>
          </div>
          <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:6}}>Industry Category</label>
            <select className="inp" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
              <option value="">Select category…</option>
              {CATEGORIES.map(c=><option key={c}>{c}</option>)}
            </select></div>
          <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:6}}>Phone</label>
            <input className="inp" value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="+251..."/></div>
          <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:6}}>Website</label>
            <input className="inp" value={form.website} onChange={e=>setForm(f=>({...f,website:e.target.value}))} placeholder="https://..."/></div>
        </div>
      </div>
      <div className="card" style={{padding:28,marginBottom:16}}>
        <h3 style={{fontWeight:600,color:"#E8DCC8",fontSize:16,marginBottom:20}}>Booth Info</h3>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:6}}>Short Bio</label>
            <input className="inp" value={form.bio} onChange={e=>setForm(f=>({...f,bio:e.target.value}))} placeholder="e.g. Founder of..."/></div>
          <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:6}}>Company Description (shown on your public profile)</label>
            <textarea className="inp" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Describe your company, what you export, your target markets…" style={{minHeight:100}}/></div>
          <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:6}}>Products / Services (one per line)</label>
            <textarea className="inp" value={form.products} onChange={e=>setForm(f=>({...f,products:e.target.value}))} placeholder={"Organic Cotton Fabric\nHabesha Kemis\nIndustrial Textiles"}/></div>
          <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:6}}>Tags (comma-separated)</label>
            <input className="inp" value={form.tags} onChange={e=>setForm(f=>({...f,tags:e.target.value}))} placeholder="Exporter, Organic, Fair Trade, ISO Certified"/></div>
          <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:6}}>Seeking</label>
            <input className="inp" value={form.seeking} onChange={e=>setForm(f=>({...f,seeking:e.target.value}))} placeholder="e.g. EU Distributors, Luxury Brand Partners, Roasters"/></div>
        </div>
      </div>
      <button className="btn btn-p" onClick={save} disabled={saving} style={{justifyContent:"center"}}>
        {saving?<Spin size={14}/>:"Save Profile Changes"}
      </button>
    </div>
  )
}

// ─── ADMIN ────────────────────────────────────────────────────
function AdminPage({ user }) {
  const [tab, setTab] = useState("overview")
  const [users, setUsers] = useState([])
  const [expos, setExpos] = useState([])
  const [marketplace, setMarketplace] = useState([])
  const [meetings, setMeetings] = useState([])
  const [loading, setLoading] = useState(false)
  const [search, setSearch] = useState("")
  const [expoForm, setExpoForm] = useState({ title:"", subtitle:"", date:"", location:"", category:"Multi-Sector", status:"upcoming", exhibitors:0, visitors:0, countries:0, sectors:"", description:"" })
  const [addingExpo, setAddingExpo] = useState(false)
  const [saving, setSaving] = useState(false)

  useEffect(()=>{
    if (!['overview','users','exhibitions','marketplace','meetings'].includes(tab)) return
    setLoading(true)
    const loads = {
      overview: ()=>Promise.all([getDocs("users",[]).catch(()=>[]),getDocs("exhibitions",[]).catch(()=>[]),getDocs("marketplace",[]).catch(()=>[]),getDocs("meetings",[]).catch(()=>[])]).then(([u,e,m,mt])=>{setUsers(u);setExpos(e);setMarketplace(m);setMeetings(mt)}),
      users: ()=>getDocs("users",[{type:"orderBy",f:"createdAt",dir:"desc"}]).then(setUsers).catch(()=>{}),
      exhibitions: ()=>getDocs("exhibitions",[]).then(setExpos).catch(()=>{}),
      marketplace: ()=>getDocs("marketplace",[{type:"orderBy",f:"createdAt",dir:"desc"}]).then(setMarketplace).catch(()=>{}),
      meetings: ()=>getDocs("meetings",[{type:"orderBy",f:"createdAt",dir:"desc"}]).then(setMeetings).catch(()=>{}),
    }
    ;(loads[tab]||loads.overview)().finally(()=>setLoading(false))
  },[tab])

  const verify = async (uid) => {
    await updateDoc("users",uid,{verified:true}).catch(()=>{})
    setUsers(u=>u.map(x=>x.id===uid?{...x,verified:true}:x))
  }
  const deleteUser = async (uid) => {
    if (!confirm("Delete this user?")) return
    await deleteDoc("users",uid).catch(()=>{})
    setUsers(u=>u.filter(x=>x.id!==uid))
  }
  const deleteExpo = async (id) => {
    if (!confirm("Delete this exhibition?")) return
    await deleteDoc("exhibitions",id).catch(()=>{})
    setExpos(e=>e.filter(x=>x.id!==id))
  }
  const addExpo = async () => {
    if (!expoForm.title) return
    setSaving(true)
    try {
      const data = { ...expoForm, sectors:expoForm.sectors.split(",").map(s=>s.trim()).filter(Boolean), exhibitors:Number(expoForm.exhibitors)||0, visitors:Number(expoForm.visitors)||0, countries:Number(expoForm.countries)||0, createdAt:ts() }
      const ref = await addDoc("exhibitions",data)
      setExpos(e=>[{...data,id:ref.id},...e])
      setAddingExpo(false); setExpoForm({ title:"",subtitle:"",date:"",location:"",category:"Multi-Sector",status:"upcoming",exhibitors:0,visitors:0,countries:0,sectors:"",description:"" })
    } catch(e) { alert(e.message) }
    setSaving(false)
  }

  const filteredUsers = users.filter(u=>!search||(u.name||"").toLowerCase().includes(search.toLowerCase())||(u.email||"").toLowerCase().includes(search.toLowerCase()))

  return (
    <div style={{maxWidth:1280,margin:"0 auto",padding:"80px 24px 60px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28}}>
        <div style={{width:40,height:40,borderRadius:10,background:"rgba(255,154,26,.15)",border:"1px solid rgba(255,154,26,.3)",display:"flex",alignItems:"center",justifyContent:"center",color:"#FF9A1A"}}>
          <Icon name="layers" size={18}/>
        </div>
        <div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,color:"#FFD59A"}}>Admin Panel</h1>
          <p style={{color:"#9A7540",fontSize:12}}>AfriExpo Platform Management</p>
        </div>
      </div>

      <div style={{display:"flex",gap:2,background:"rgba(19,13,2,.5)",borderRadius:12,padding:4,marginBottom:28,width:"fit-content",border:"1px solid rgba(69,48,13,.3)"}}>
        {[["overview","Overview"],["users","Users"],["exhibitions","Exhibitions"],["marketplace","Marketplace"],["meetings","Meetings"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"7px 16px",borderRadius:9,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:tab===id?"#FF9A1A":"transparent",color:tab===id?"#0a0806":"#9A7540",whiteSpace:"nowrap"}}>
            {label}
          </button>
        ))}
      </div>

      {loading&&<div style={{textAlign:"center",padding:60}}><Spin size={28}/></div>}

      {!loading&&tab==="overview"&&(
        <div style={{display:"flex",flexDirection:"column",gap:20}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14}}>
            {[["users","Total Users",users.length,"Registered accounts"],["building","Exhibitors",users.filter(u=>u.role==="exhibitor").length,"Registered exhibitors"],["expo","Exhibitions",expos.length,"Platform events"],["shop","Listings",marketplace.length,"Marketplace items"],["calendar","Meetings",meetings.length,"Total meetings booked"]].map(([ic,l,v,s])=>(
              <div key={l} className="card" style={{padding:20}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <p style={{color:"#7D5C28",fontSize:12}}>{l}</p><Icon name={ic} size={14} style={{color:"#FF9A1A"}}/>
                </div>
                <p style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,color:"#FF9A1A"}}>{v}</p>
                <p style={{fontSize:11,color:"#614518",marginTop:3}}>{s}</p>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div className="card" style={{padding:22}}>
              <h3 style={{fontWeight:600,color:"#E8DCC8",fontSize:14,marginBottom:14}}>Recent Users</h3>
              {users.slice(0,5).map(u=>(
                <div key={u.id} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(69,48,13,.2)",alignItems:"center"}}>
                  <Av name={u.name} color="#7c3d12" size={28}/>
                  <div style={{flex:1}}>
                    <p style={{color:"#B89660",fontSize:12}}>{u.name}</p>
                    <p style={{color:"#614518",fontSize:10}}>{u.role} · {u.email}</p>
                  </div>
                  {u.verified&&<Icon name="check" size={12} style={{color:"#34d399"}}/>}
                </div>
              ))}
            </div>
            <div className="card" style={{padding:22}}>
              <h3 style={{fontWeight:600,color:"#E8DCC8",fontSize:14,marginBottom:14}}>Unverified Users</h3>
              {users.filter(u=>!u.verified).length===0?<p style={{color:"#614518",fontSize:13}}>All users verified!</p>:
              users.filter(u=>!u.verified).slice(0,5).map(u=>(
                <div key={u.id} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(69,48,13,.2)",alignItems:"center"}}>
                  <Av name={u.name} color="#92400e" size={28}/>
                  <div style={{flex:1}}>
                    <p style={{color:"#B89660",fontSize:12}}>{u.name} · {u.role}</p>
                    <p style={{color:"#614518",fontSize:10}}>{u.email}</p>
                  </div>
                  <button className="btn btn-p" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>verify(u.id)}>Verify</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {!loading&&tab==="users"&&(
        <div>
          <div style={{display:"flex",gap:12,marginBottom:16}}>
            <div style={{position:"relative",flex:1}}>
              <Icon name="search" size={14} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#614518"}}/>
              <input className="inp" placeholder="Search users…" style={{paddingLeft:36}} value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {filteredUsers.map(u=>(
              <div key={u.id} className="card" style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:14}}>
                <Av name={u.name} color="#92400e" size={40}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <p style={{fontWeight:600,color:"#E8DCC8",fontSize:14}}>{u.name}</p>
                    {u.verified&&<Icon name="check" size={13} style={{color:"#34d399"}}/>}
                  </div>
                  <p style={{color:"#7D5C28",fontSize:12}}>{u.email} · {u.role} · {u.country||"Unknown"}</p>
                  {u.company&&<p style={{color:"#614518",fontSize:11}}>{u.company}</p>}
                </div>
                <div style={{display:"flex",gap:8}}>
                  {!u.verified&&<button className="btn btn-p" style={{fontSize:12,padding:"6px 12px"}} onClick={()=>verify(u.id)}>Verify</button>}
                  {u.id!==user.id&&<button className="btn btn-d" style={{fontSize:12,padding:"6px 10px"}} onClick={()=>deleteUser(u.id)}><Icon name="trash" size={13}/></button>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {!loading&&tab==="exhibitions"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <h2 style={{fontWeight:600,color:"#E8DCC8",fontSize:18}}>All Exhibitions</h2>
            <button className="btn btn-p" onClick={()=>setAddingExpo(!addingExpo)} style={{fontSize:13}}><Icon name="plus" size={14}/>New Exhibition</button>
          </div>
          {addingExpo&&(
            <div className="card" style={{padding:24,marginBottom:20}}>
              <h3 style={{fontWeight:600,color:"#E8DCC8",marginBottom:16}}>Create Exhibition</h3>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                {[["title","Title *"],["subtitle","Subtitle"],["date","Date"],["location","Location"],["category","Category"],["status","Status"]].map(([k,l])=>(
                  k==="status"?
                  <div key={k}><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:5}}>{l}</label>
                    <select className="inp" value={expoForm[k]} onChange={e=>setExpoForm(f=>({...f,[k]:e.target.value}))}>
                      {["upcoming","live","completed"].map(s=><option key={s}>{s}</option>)}
                    </select></div>:
                  <div key={k}><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:5}}>{l}</label>
                    <input className="inp" value={expoForm[k]} onChange={e=>setExpoForm(f=>({...f,[k]:e.target.value}))}/></div>
                ))}
                <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:5}}>Exhibitors</label><input className="inp" type="number" value={expoForm.exhibitors} onChange={e=>setExpoForm(f=>({...f,exhibitors:e.target.value}))}/></div>
                <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:5}}>Expected Visitors</label><input className="inp" type="number" value={expoForm.visitors} onChange={e=>setExpoForm(f=>({...f,visitors:e.target.value}))}/></div>
                <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:5}}>Countries</label><input className="inp" type="number" value={expoForm.countries} onChange={e=>setExpoForm(f=>({...f,countries:e.target.value}))}/></div>
                <div><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:5}}>Sectors (comma-separated)</label><input className="inp" value={expoForm.sectors} onChange={e=>setExpoForm(f=>({...f,sectors:e.target.value}))}/></div>
                <div style={{gridColumn:"1/-1"}}><label style={{color:"#9A7540",fontSize:12,display:"block",marginBottom:5}}>Description</label><textarea className="inp" value={expoForm.description} onChange={e=>setExpoForm(f=>({...f,description:e.target.value}))}/></div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:16}}>
                <button className="btn btn-p" onClick={addExpo} disabled={saving}>{saving?<Spin size={14}/>:"Create Exhibition"}</button>
                <button className="btn btn-g" onClick={()=>setAddingExpo(false)}>Cancel</button>
              </div>
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {expos.map(e=>(
              <div key={e.id} className="card" style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:14}}>
                <Badge status={e.status}/>
                <div style={{flex:1}}>
                  <p style={{fontWeight:600,color:"#E8DCC8",fontSize:14}}>{e.title}</p>
                  <p style={{color:"#7D5C28",fontSize:12}}>{e.date} · {e.location} · {e.exhibitors} exhibitors</p>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <select className="inp" value={e.status} onChange={async(ev)=>{await updateDoc("exhibitions",e.id,{status:ev.target.value}).catch(()=>{});setExpos(es=>es.map(x=>x.id===e.id?{...x,status:ev.target.value}:x))}} style={{fontSize:12,padding:"5px 8px",width:110}}>
                    {["upcoming","live","completed"].map(s=><option key={s}>{s}</option>)}
                  </select>
                  <button className="btn btn-d" style={{fontSize:12,padding:"6px 10px"}} onClick={()=>deleteExpo(e.id)}><Icon name="trash" size={13}/></button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {!loading&&tab==="marketplace"&&(
        <div>
          <h2 style={{fontWeight:600,color:"#E8DCC8",fontSize:18,marginBottom:16}}>Marketplace Listings ({marketplace.length})</h2>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {marketplace.map(l=>(
              <div key={l.id} className="card" style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:14}}>
                <div style={{flex:1}}>
                  <p style={{fontWeight:600,color:"#E8DCC8",fontSize:14}}>{l.title}</p>
                  <p style={{color:"#7D5C28",fontSize:12}}>{l.seller} · {l.category} · {l.price}</p>
                </div>
                <button className="btn btn-d" style={{fontSize:12,padding:"6px 10px"}} onClick={async()=>{await deleteDoc("marketplace",l.id).catch(()=>{});setMarketplace(m=>m.filter(x=>x.id!==l.id))}}><Icon name="trash" size={13}/></button>
              </div>
            ))}
            {marketplace.length===0&&<p style={{color:"#614518",fontSize:13}}>No listings yet.</p>}
          </div>
        </div>
      )}

      {!loading&&tab==="meetings"&&(
        <div>
          <h2 style={{fontWeight:600,color:"#E8DCC8",fontSize:18,marginBottom:16}}>All Meetings ({meetings.length})</h2>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {meetings.map(m=>(
              <div key={m.id} className="card" style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:14}}>
                <Av name={m.userName||"?"} color="#7c3d12" size={36}/>
                <div style={{flex:1}}>
                  <p style={{fontWeight:600,color:"#E8DCC8",fontSize:14}}>{m.userName} → {m.with}</p>
                  <p style={{color:"#7D5C28",fontSize:12}}>{m.date}{m.time&&` at ${m.time}`} · {m.topic||"Business Meeting"}</p>
                </div>
                <button className="btn btn-d" style={{fontSize:12,padding:"6px 10px"}} onClick={async()=>{await deleteDoc("meetings",m.id).catch(()=>{});setMeetings(ms=>ms.filter(x=>x.id!==m.id))}}><Icon name="trash" size={13}/></button>
              </div>
            ))}
            {meetings.length===0&&<p style={{color:"#614518",fontSize:13}}>No meetings yet.</p>}
          </div>
        </div>
      )}
    </div>
  )
}

// ─── ABOUT ────────────────────────────────────────────────────
function AboutPage({ setPage }) {
  const TEAM = [
    {name:"Alem Tadesse",role:"CEO & Co-Founder",origin:"🇪🇹",bio:"Former trade finance director at Bank of Abyssinia. 15 years in export facilitation."},
    {name:"Fatima Osei",role:"CTO & Co-Founder",origin:"🇬🇭",bio:"Ex-Google engineer. Built payment infrastructure across 12 African markets."},
    {name:"David Kamau",role:"VP Operations",origin:"🇰🇪",bio:"Led logistics operations for Pan-Africa Logistics Hub."},
    {name:"Sara Haile",role:"Head of Partnerships",origin:"🇪🇹",bio:"Former liaison at Ethiopian Chamber of Commerce. Expert in AfCFTA."},
  ]
  return (
    <div style={{maxWidth:1100,margin:"0 auto",padding:"80px 24px 60px"}}>

        <p style={{color:"#9A7540",fontSize:15,lineHeight:1.8}}>AfriExpo was born from a simple observation: Africa has world-class products and talented exporters, but lacks the digital infrastructure to connect them with global buyers.</p>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:14,marginBottom:60}}>

          <div key={title} className="card" style={{padding:22}}>
            <div style={{width:36,height:36,borderRadius:9,background:"rgba(46,24,0,.6)",border:"1px solid rgba(138,73,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",color:"#FF9A1A",marginBottom:14}}><Icon name={ic} size={17}/></div>
            <h3 style={{fontWeight:600,color:"#E8DCC8",marginBottom:8,fontSize:15}}>{title}</h3>
            <p style={{color:"#9A7540",fontSize:13,lineHeight:1.7}}>{desc}</p>

      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14,marginBottom:60}}>

          <div key={m.name} className="card" style={{padding:20,textAlign:"center"}}>
            <div style={{width:60,height:60,borderRadius:30,background:"linear-gradient(135deg,#92400e,#7c2d12)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",color:"#fff",fontWeight:700,fontSize:18}}>
              {m.name.split(" ").map(n=>n[0]).join("")}
            </div>
            <p style={{fontWeight:600,color:"#E8DCC8",fontSize:14}}>{m.name}</p>
            <p style={{color:"#FF9A1A",fontSize:12,marginBottom:2}}>{m.role}</p>
            <p style={{color:"#7D5C28",fontSize:13,marginBottom:8}}>{m.origin}</p>
            <p style={{color:"#9A7540",fontSize:12,lineHeight:1.6}}>{m.bio}</p>
          </div>
        ))}
      </div>
      <div className="card" style={{padding:48,textAlign:"center"}}>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,color:"#f5f0e8",marginBottom:10}}>Join the Movement</h2>

        <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="btn btn-p" onClick={()=>setPage("dashboard")} style={{fontSize:15}}>Start for Free →</button>
          <button className="btn btn-o" onClick={()=>setPage("matchmaking")} style={{fontSize:15}}>Find Trade Partners</button>
        </div>
      </div>
    </div>
  )
}

// ─── APP ROOT ─────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null)
  const [authChecked, setAuthChecked] = useState(false)
  const [page, setPage] = useState("home")
  const [showNotif, setShowNotif] = useState(false)
  const [notifCount, setNotifCount] = useState(0)

  // Parse page params (e.g. "expo-abc123", "user-abc123")
  const pageBase = page.startsWith("expo-")?"expo-detail":page.startsWith("user-")?"user-detail":page
  const pageId = page.startsWith("expo-")?page.slice(5):page.startsWith("user-")?page.slice(5):null

  useEffect(()=>{
    const a = auth()
    if (!a) { setAuthChecked(true); return }
    const unsub = a.onAuthStateChanged(async fbUser => {
      if (fbUser) {
        try {
          const snap = await db()?.collection("users").doc(fbUser.uid).get()
          const p = snap?.exists ? snap.data() : {}
          setUser({ id:fbUser.uid, name:p.name||fbUser.displayName||fbUser.email?.split("@")[0]||"User", email:fbUser.email, role:p.role||"visitor", company:p.company||"", avatar:p.avatar||(p.name||"U").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(), verified:p.verified||false, country:p.country||"", bio:p.bio||"", category:p.category||"", products:p.products||[], tags:p.tags||[], description:p.description||"", seeking:p.seeking||"" })
        } catch { setUser(null) }
      } else { setUser(null) }
      setAuthChecked(true)
    })
    return ()=>unsub()
  },[])

  // Count unread notifications
  useEffect(()=>{
    if (!user?.id||user.isGuest) return
    const unsub = onSnap("notifications",[{type:"where",f:"userId",op:"==",v:user.id},{type:"where",f:"read",op:"==",v:false}], docs=>setNotifCount(docs.length))
    return ()=>unsub?.()
  },[user?.id])

  const handleAuth = (u) => {
    setUser(u)
    setPage(u.role==="admin"?"admin":"home")
  }
  const handleLogout = async () => {
    try { await auth()?.signOut() } catch {}
    setUser(null); setPage("home")
  }

  if (!authChecked) return (
    <div style={{minHeight:"100vh",background:"#0a0806",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <style>{S}</style>
      <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#FF9A1A,#E67E00)",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{color:"#0a0806",fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:22}}>A</span>
      </div>
      <Spin size={20}/>
      <p style={{color:"#7D5C28",fontSize:13}}>Loading AfriExpo…</p>
    </div>
  )

  if (!user) return <><style>{S}</style><AuthPage onAuth={handleAuth}/></>

  const renderPage = () => {
    switch(pageBase) {
      case "home": return <HomePage setPage={setPage} user={user}/>
      case "exhibitions": return <ExhibitionsPage setPage={setPage}/>
      case "expo-detail": return <ExpoDetailPage expoId={pageId} setPage={setPage}/>
      case "exhibitors": return <ExhibitorsPage setPage={setPage}/>
      case "user-detail": return <UserDetailPage userId={pageId} setPage={setPage}/>
      case "marketplace": return <MarketplacePage user={user} setPage={setPage}/>
      case "financing": return <FinancingPage user={user}/>
      case "logistics": return <LogisticsPage/>
      case "matchmaking": return <MatchmakingPage user={user}/>
      case "messages": return <MessagesPage user={user}/>
      case "dashboard": return <DashboardPage user={user} setPage={setPage}/>
      case "admin": return user.role==="admin"?<AdminPage user={user}/>:<HomePage setPage={setPage} user={user}/>
      case "about": return <AboutPage setPage={setPage}/>
      default: return <HomePage setPage={setPage} user={user}/>
    }
  }

  return (
    <div style={{minHeight:"100vh",background:"#0a0806"}}>
      <style>{S}</style>
      <Navbar page={pageBase} setPage={setPage} user={user} onLogout={handleLogout} notifCount={notifCount} setShowNotif={setShowNotif}/>
      {showNotif&&<NotifPanel user={user} onClose={()=>setShowNotif(false)}/>}
      {showNotif&&<div style={{position:"fixed",inset:0,zIndex:55}} onClick={()=>setShowNotif(false)}/>}
      <main>{renderPage()}</main>
      {!["messages"].includes(pageBase)&&(
        <footer style={{background:"rgba(10,8,6,.95)",borderTop:"1px solid rgba(69,48,13,.3)",padding:"40px 24px 24px",marginTop:0}}>
          <div style={{maxWidth:1280,margin:"0 auto"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:28,marginBottom:32}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,#FF9A1A,#E67E00)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <span style={{color:"#0a0806",fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:14}}>A</span>
                  </div>
                  <span style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:"#FFD59A"}}>AfriExpo</span>
                </div>
                <p style={{color:"#7D5C28",fontSize:12,lineHeight:1.7}}>Africa's Digital Hub for Trade & Commerce. Connecting 42+ countries.</p>
              </div>
              {[["Platform",["exhibitions","exhibitors","marketplace","matchmaking"]],["Services",["financing","logistics","messages","about"]],["Legal",["about"]]].map(([title,links])=>(
                <div key={title}>
                  <p style={{color:"#E8DCC8",fontWeight:600,fontSize:13,marginBottom:10}}>{title}</p>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {links.map(l=>(
                      <button key={l} onClick={()=>setPage(l)} style={{color:"#7D5C28",fontSize:12,background:"none",border:"none",cursor:"pointer",textAlign:"left",padding:0}}
                        onMouseEnter={e=>e.target.style.color="#FF9A1A"} onMouseLeave={e=>e.target.style.color="#7D5C28"}>
                        {l.charAt(0).toUpperCase()+l.slice(1)}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div className="pline" style={{marginBottom:16}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
              <p style={{color:"#614518",fontSize:11}}>© 2025 AfriExpo. Built for Africa, by Africans.</p>
              <p style={{color:"#614518",fontSize:11}}>Privacy Policy · Terms of Service · AfCFTA Compliant</p>
            </div>
          </div>
        </footer>
      )}
    </div>
  )
}

function mount() {
  const el = document.getElementById("root")
  if (el&&!el._m) { el._m=true; ReactDOM.createRoot(el).render(React.createElement(App)) }
}
if (window._fbReady) { mount() } else {
  window.addEventListener("fb-ready",function h(){ window.removeEventListener("fb-ready",h); mount() })
  setTimeout(mount,200)
}
</script>
</body>
</html>
